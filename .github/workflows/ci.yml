name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint & Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: pip install ruff

      - name: Syntax check (compile all modules)
        run: python -m compileall -q main.py modules

      - name: Lint (errors only)
        # 只拦截真正的错误：语法错误 / 未定义名称 / 无效比较等
        run: ruff check --select E9,F63,F7,F82 .
